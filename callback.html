<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization Successful - Burmese Dub Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: white; text-align: center; padding: 24px; }
        .card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 48px; max-width: 480px; }
        h1 { font-size: 1.5rem; margin-bottom: 12px; }
        p { opacity: 0.75; line-height: 1.6; margin-bottom: 16px; }
        .icon { font-size: 3rem; margin-bottom: 16px; }
        .code { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; font-family: monospace; font-size: 0.85rem; word-break: break-all; margin: 16px 0; }
    </style>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        window.onload = function() {
            if (code) {
                document.getElementById('status').textContent = 'Authorization successful!';
                document.getElementById('code-display').textContent = 'Auth code: ' + code.substring(0, 20) + '...';
            }
        };
    </script>
</head>
<body>
<div class="card">
    <div class="icon">✅</div>
    <h1 id="status">Authorization Complete</h1>
    <p>Your TikTok account has been connected to Burmese Dub Bot. You can close this window now.</p>
    <div class="code" id="code-display">Processing...</div>
    <p>Return to Telegram bot to start dubbing videos.</p>
</div>
</body>
</html>
